name: Redirect Mirror Pull Requests

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

jobs:
  redirect:
    if: github.repository == 'joi-lab/ouroboros'
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close mirror pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_URL" --body "Thanks for contributing. This repository is an active mirror. Please reopen this pull request against the official repository: https://github.com/razzant/ouroboros"
          gh pr close "$PR_URL"
